<script>
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var TW = canvas.width  = 1280;
var TH = canvas.height = 720;
var QW = 640, QH = 360;
if (window.EzAzGame) EzAzGame.fitCanvas(canvas);

var SLUG = 'dino-jump';
var GRAVITY   = 0.48;
var JUMP      = 11.5;
var MOVE      = 4.2;
var MAX_FALL  = 14;
var PW = 26, PH = 24; // player width/height
var PLAT_H = 9;

// Characters (borrowed from Descent)
var CHARS = [
  { name: 'SLATE', colour: '#a0a0a0', bg: '#151008', leftKeys: ['ArrowLeft'],  rightKeys: ['ArrowRight'] },
  { name: 'PIXEL', colour: '#00ffcc', bg: '#04090f', leftKeys: ['KeyA'],        rightKeys: ['KeyD'] },
  { name: 'FERN',  colour: '#44cc66', bg: '#041008', leftKeys: ['KeyJ'],        rightKeys: ['KeyL'] },
  { name: 'ECHO',  colour: '#aa88ff', bg: '#080410', leftKeys: ['Numpad4','Comma'], rightKeys: ['Numpad6','Period'] }
];

var keys = {};
// Phone input state per character slot (set by ActionCable)
var phoneInput = [
  { left: false, right: false },
  { left: false, right: false },
  { left: false, right: false },
  { left: false, right: false }
];

window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Escape') togglePause();
  if (e.code === 'Enter' && gameState === 'title') tvStart();
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].indexOf(e.code) >= 0) e.preventDefault();
});
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

function isLeft(ci)  { return phoneInput[ci].left  || CHARS[ci].leftKeys.some(function(k)  { return keys[k]; }); }
function isRight(ci) { return phoneInput[ci].right || CHARS[ci].rightKeys.some(function(k) { return keys[k]; }); }

// ---- Audio ----
var audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function blip(freq, endFreq, dur, vol) {
  try {
    var ac = getAC(), o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(freq, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(endFreq, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function playJump(ci)   { var f=[440,660,550,770]; blip(f[ci], f[ci]*1.4, 0.09, 0.10); }
function playBounce()   { blip(660, 1100, 0.11, 0.12); }
function playDeath(ci)  { blip(280, 70, 0.38, 0.13); }

// ---- World creation ----
function createWorld(ci) {
  var plats = [];
  // Big safe starting platform
  plats.push({ x: QW/2 - 80, y: 20, w: 160, type: 'normal', vx: 0, broken: false, bt: 0 });
  var gy = 20;
  for (var i = 0; i < 45; i++) {
    gy -= genGap(0);
    pushPlat(plats, gy, 0);
  }
  return {
    ci: ci,
    p: { x: QW/2, y: -10, vy: 0, squish: 0 },
    plats: plats,
    camY: QH - 60,
    score: 0,
    dead: false,
    finalScore: 0
  };
}

function genGap(score) {
  var base = 65 + Math.random() * 17; // 65-82px, well within jump height of ~138px
  return Math.max(55, base - score * 0.003);
}

var _lastPlatType = 'normal'; // tracked across pushPlat calls to prevent unsafe sequences

function pushPlat(plats, y, score) {
  var w = Math.max(52, 108 - score * 0.012);
  var x = 10 + Math.random() * (QW - w - 20);
  var type = 'normal', vx = 0;
  var r = Math.random();

  // Never follow a break or ghost with another dangerous type -- guarantee escape
  var prev = _lastPlatType;
  if (prev === 'break' || prev === 'ghost') {
    type = 'normal';
  } else if (score > 200 && r < 0.12) {
    type = 'ghost';
  } else if (score > 80 && r < 0.28) {
    type = 'move'; vx = (1.1 + Math.random() * 1.2) * (Math.random() < 0.5 ? 1 : -1);
  } else if (score > 35 && r < 0.40) {
    type = 'break';
  } else if (score > 12 && r < 0.46) {
    type = 'bounce';
  }

  _lastPlatType = type;
  var phaseOffset = Math.floor(Math.random() * 120);
  plats.push({ x: x, y: y, w: w, type: type, vx: vx, broken: false, bt: 0, phase: phaseOffset });
}

// ---- Update ----
function updateWorld(w) {
  if (w.dead) return;
  var p = w.p, ci = w.ci;
  var spd = ci === 1 ? MOVE * 1.18 : MOVE; // Pixel is faster

  if (isLeft(ci))  p.x -= spd;
  if (isRight(ci)) p.x += spd;

  // Wrap
  if (p.x < -PW/2)      p.x = QW + PW/2;
  if (p.x > QW + PW/2)  p.x = -PW/2;

  // Physics
  var prevBottom = p.y + PH;
  p.vy = Math.min(p.vy + GRAVITY, MAX_FALL);
  p.y += p.vy;
  var currBottom = p.y + PH;

  // Platform collisions (only when falling)
  if (currBottom > prevBottom) {
    for (var i = 0; i < w.plats.length; i++) {
      var pl = w.plats[i];
      if (pl.broken) continue;
      if (pl.type === 'ghost' && pl.phase >= 60) continue; // invisible = non-solid
      if (prevBottom <= pl.y + 1 && currBottom >= pl.y &&
          p.x + PW/2 > pl.x && p.x - PW/2 < pl.x + pl.w) {
        p.y = pl.y - PH;
        if (pl.type === 'bounce') {
          p.vy = -JUMP * 1.65; p.squish = 14; playBounce();
        } else {
          p.vy = -JUMP; p.squish = 7; playJump(ci);
          if (pl.type === 'break') { pl.broken = true; pl.bt = 28; }
        }
        break;
      }
    }
  }

  // Update breaking platforms
  for (var i = 0; i < w.plats.length; i++) {
    var pl = w.plats[i];
    if (pl.broken && pl.bt > 0) { pl.bt--; pl.y += 4; }
  }

  // Move sliding platforms + advance ghost phase
  for (var i = 0; i < w.plats.length; i++) {
    var pl = w.plats[i];
    if (pl.type === 'move' && !pl.broken) {
      pl.x += pl.vx;
      if (pl.x < 0 || pl.x + pl.w > QW) pl.vx = -pl.vx;
    }
    if (pl.type === 'ghost') {
      pl.phase = (pl.phase + 1) % 120; // 2-second cycle at 60fps
    }
  }

  // Camera only follows up
  var target = p.y - QH * 0.38;
  if (target < w.camY) w.camY = target;

  // Score = altitude climbed
  var alt = Math.max(0, Math.floor(-p.y / 8));
  if (alt > w.score) w.score = alt;

  // Generate more platforms above
  var highest = w.plats.reduce(function(m, pl) { return Math.min(m, pl.y); }, 0);
  while (highest > w.camY - QH * 2.2) {
    highest -= genGap(w.score);
    pushPlat(w.plats, highest, w.score);
  }
  // Prune platforms well below camera
  w.plats = w.plats.filter(function(pl) { return pl.y < w.camY + QH + 80; });

  if (p.squish > 0) p.squish--;

  // Death: fell below screen
  if (p.y > w.camY + QH + 120) {
    w.dead = true;
    w.finalScore = w.score;
    playDeath(ci);
  }
}

// ---- Character drawing ----
function drawSlate(x, y, sq) {
  var sx = 1 + sq*0.035, sy = 1 - sq*0.035;
  ctx.save(); ctx.translate(x, y); ctx.scale(sx, sy);
  ctx.fillStyle = '#888'; ctx.fillRect(-14, -10, 6, 8);   // frill
  ctx.fillStyle = '#a0a0a0'; ctx.fillRect(-13, -6, 26, 13); // body
  ctx.fillStyle = '#b8b8b8'; ctx.fillRect(9, -14, 11, 11);  // head
  ctx.fillStyle = '#ddd';
  ctx.fillRect(16, -19, 3, 7); // main horn
  ctx.fillRect(11, -17, 2, 5); // side horn
  ctx.fillStyle = '#111'; ctx.fillRect(16, -12, 3, 3); // eye
  ctx.fillStyle = '#777'; ctx.fillRect(-20, -3, 9, 5); // tail
  ctx.restore();
}

function drawPixel(x, y, sq) {
  var sx = 1 + sq*0.035, sy = 1 - sq*0.035;
  ctx.save(); ctx.translate(x, y); ctx.scale(sx, sy);
  ctx.fillStyle = '#00ddaa'; ctx.fillRect(-5, -12, 5, 10); // back spike
  ctx.fillStyle = '#00ffcc'; ctx.fillRect(-9, -5, 18, 13); // body
  ctx.fillStyle = '#00ddaa'; ctx.fillRect(5, -16, 13, 13); // head
  ctx.fillStyle = '#003322'; ctx.fillRect(13, -13, 4, 4);  // eye
  ctx.fillStyle = '#00ddaa'; ctx.fillRect(-18, 1, 11, 4);  // tail
  ctx.fillRect(-22, -1, 7, 2); // tail tip
  ctx.restore();
}

function drawFern(x, y, sq) {
  var sx = 1 + sq*0.035, sy = 1 - sq*0.035;
  ctx.save(); ctx.translate(x, y); ctx.scale(sx, sy);
  ctx.fillStyle = '#33aa55'; ctx.fillRect(-22, 0, 10, 6); // tail
  ctx.fillRect(-29, 1, 9, 3);
  ctx.fillStyle = '#44cc66'; ctx.fillRect(-15, -5, 26, 14); // body
  ctx.fillRect(8, -24, 6, 22); // neck
  ctx.fillRect(10, -30, 10, 9); // head
  ctx.fillStyle = '#001100'; ctx.fillRect(16, -28, 3, 3); // eye
  ctx.restore();
}

function drawEcho(x, y, sq) {
  var sx = 1 + sq*0.035, sy = 1 - sq*0.035;
  ctx.save(); ctx.translate(x, y); ctx.scale(sx, sy);
  ctx.fillStyle = '#7755bb'; ctx.fillRect(-26, -13, 18, 7); // left wing
  ctx.fillRect(10, -13, 18, 7);                              // right wing
  ctx.fillStyle = '#5533aa'; ctx.fillRect(-30, -11, 7, 4);  // wing tip L
  ctx.fillRect(25, -11, 7, 4);                               // wing tip R
  ctx.fillStyle = '#aa88ff'; ctx.fillRect(-9, -7, 18, 13);  // body
  ctx.fillStyle = '#cc99ff'; ctx.fillRect(5, -17, 10, 13);  // head
  ctx.fillStyle = '#9966dd'; ctx.fillRect(13, -14, 9, 4);   // beak
  ctx.fillStyle = '#220044'; ctx.fillRect(7, -15, 3, 3);    // eye
  ctx.restore();
}

var drawFns = [drawSlate, drawPixel, drawFern, drawEcho];

// ---- Draw quadrant ----
function drawQuadrant(qx, qy, w) {
  var ch = CHARS[w.ci], p = w.p;
  ctx.save();
  ctx.beginPath(); ctx.rect(qx, qy, QW, QH); ctx.clip();
  ctx.translate(qx, qy);

  // Background
  ctx.fillStyle = ch.bg;
  ctx.fillRect(0, 0, QW, QH);

  // Static stars (seeded per character)
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  var r = w.ci * 137 + 1;
  for (var s = 0; s < 35; s++) {
    r = (r * 1664525 + 1013904223) & 0x7fffffff;
    ctx.fillRect(r % QW, (r * 7919 + 1) % QH & 0x7fff, 1, 1);
  }

  var camY = w.camY;

  // Platforms
  for (var i = 0; i < w.plats.length; i++) {
    var pl = w.plats[i];
    var sy = pl.y - camY;
    if (sy < -20 || sy > QH + 20) continue;

    if (pl.broken) {
      ctx.globalAlpha = pl.bt / 28;
      ctx.fillStyle = '#ff6633';
      ctx.fillRect(pl.x,                sy,     pl.w * 0.45, PLAT_H);
      ctx.fillRect(pl.x + pl.w * 0.55, sy + 3, pl.w * 0.45, PLAT_H);
      ctx.globalAlpha = 1;
    } else if (pl.type === 'ghost') {
      // Pulse: solid for phase 0-59, fading out 45-59, fading in 60-74, invisible 75-119
      var alpha;
      if (pl.phase < 45)       alpha = 1;
      else if (pl.phase < 60)  alpha = 1 - (pl.phase - 45) / 15;
      else if (pl.phase < 75)  alpha = (pl.phase - 60) / 15;
      else                     alpha = 0;
      if (alpha > 0) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#44aaff';
        ctx.fillRect(pl.x, sy, pl.w, PLAT_H);
        ctx.fillStyle = 'rgba(180,230,255,0.4)';
        ctx.fillRect(pl.x + 2, sy, pl.w - 4, 2);
        ctx.globalAlpha = 1;
      }
    } else {
      var pc = { normal: '#ffffff', move: '#ffe44d', break: '#ff8833', bounce: '#44ff88' }[pl.type];
      ctx.fillStyle = pc;
      ctx.fillRect(pl.x, sy, pl.w, PLAT_H);
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.fillRect(pl.x + 2, sy, pl.w - 4, 2);
    }
  }

  // Player
  var px = p.x, py = p.y - camY;
  if (!w.dead) {
    drawFns[w.ci](px, py, p.squish);
    // Wrap ghost
    if (px < PW)       drawFns[w.ci](px + QW, py, p.squish);
    if (px > QW - PW)  drawFns[w.ci](px - QW, py, p.squish);
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(5, 5, 160, 30);
  ctx.fillStyle = ch.colour;
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.fillText(ch.name, 11, 18);
  ctx.fillStyle = '#ccc';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillText(w.score + ' ALT', 11, 30);

  // OUT overlay
  if (w.dead) {
    ctx.fillStyle = 'rgba(0,0,0,0.70)';
    ctx.fillRect(0, 0, QW, QH);
    ctx.fillStyle = ch.colour;
    ctx.font = 'bold 30px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('OUT', QW/2, QH/2 - 8);
    ctx.fillStyle = '#aaa';
    ctx.font = '11px "Press Start 2P", monospace';
    ctx.fillText(w.finalScore + ' ALT', QW/2, QH/2 + 16);
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

// ---- Draw full frame ----
function drawFrame() {
  ctx.clearRect(0, 0, TW, TH);
  drawQuadrant(0,  0,  worlds[0]);
  drawQuadrant(QW, 0,  worlds[1]);
  drawQuadrant(0,  QH, worlds[2]);
  drawQuadrant(QW, QH, worlds[3]);

  // Dividers
  ctx.fillStyle = '#000';
  ctx.fillRect(QW - 2, 0, 4, TH);
  ctx.fillRect(0, QH - 2, TW, 4);

  // Centre: game clock
  var secsLeft = Math.max(0, Math.ceil(GAME_SECS - (Date.now() - gameStartTime) / 1000));
  var urgent = secsLeft <= 10;
  ctx.save();
  ctx.globalAlpha = urgent ? 0.9 : 0.30;
  ctx.fillStyle = urgent ? '#ff4444' : '#ffe44d';
  ctx.font = (urgent ? 'bold ' : '') + '10px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(secsLeft + 's', TW/2, TH/2 + 5);
  ctx.restore();
}

// ---- Leaderboard ----
var lbData = [];
async function fetchLb() {
  try {
    var r = await fetch('/api/scores?game=' + SLUG);
    var d = await r.json();
    lbData = d.scores || [];
  } catch(e) {
    try { lbData = JSON.parse(localStorage.getItem('lb_' + SLUG) || '[]'); } catch(e2) { lbData = []; }
  }
  renderLb('titleLb');
}
function renderLb(elId, hlName) {
  var el = document.getElementById(elId);
  if (!el) return;
  if (!lbData.length) {
    el.innerHTML = '<div class="lb-title">HIGH SCORES</div><div class="lb-empty">No scores yet. Be the first!</div>';
    return;
  }
  var h = '<div class="lb-title">HIGH SCORES</div>';
  lbData.slice(0, 10).forEach(function(row, i) {
    var hl = hlName && row.name === hlName ? ' highlight' : '';
    h += '<div class="lb-row' + hl + '"><span>#' + (i+1) + ' ' + row.name + '</span><span>' + row.value + '</span></div>';
  });
  el.innerHTML = h;
}

var winnerScore = 0, winnerCi = 0;

async function saveScore() {
  var name = (document.getElementById('nameInput').value || '').trim().toUpperCase() || 'ANON';
  try {
    var r = await fetch('/api/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game: SLUG, name: name, value: winnerScore })
    });
    var d = await r.json();
    lbData = d.scores || lbData;
    localStorage.setItem('lb_' + SLUG, JSON.stringify(lbData));
  } catch(e) {
    lbData.push({ name: name, value: winnerScore });
    lbData.sort(function(a,b) { return b.value - a.value; });
    lbData = lbData.slice(0, 10);
    localStorage.setItem('lb_' + SLUG, JSON.stringify(lbData));
  }
  document.getElementById('nameEntry').style.display = 'none';
  renderLb('endLb', name);
}

// ---- ActionCable ----
var CHARS_BC = 'BCDFGHJKLMNPQRSTVWXYZ23456789';
var gameCode = Array.from({ length: 4 }, function() {
  return CHARS_BC[Math.floor(Math.random() * CHARS_BC.length)];
}).join('');

var wsBase = window.location.origin.replace(/^http/, 'ws') + '/cable';
var tvCable = null, tvSub = null;

function initCable() {
  try {
    tvCable = { _ws: null, _connect: function() {
      var self = tvCable;
      self._ws = new WebSocket(wsBase);
      self._ws.onopen = function() { if (tvSub) tvSub._subscribe(); };
      self._ws.onmessage = function(e) {
        var msg = JSON.parse(e.data);
        if (msg.type === 'ping' || msg.type === 'welcome' || msg.type === 'confirm_subscription') return;
        if (tvSub && tvSub._id === msg.identifier && msg.message) handleCable(msg.message);
      };
      self._ws.onclose = function() { setTimeout(function() { self._connect(); }, 2000); };
    }};
    tvCable._connect();

    var params = { channel: 'DinoJumpChannel', code: gameCode, role: 'tv' };
    tvSub = {
      _id: JSON.stringify(params),
      _subscribe: function() {
        tvCable._ws.send(JSON.stringify({ command: 'subscribe', identifier: this._id }));
      },
      send: function(action, data) {
        if (tvCable._ws && tvCable._ws.readyState === WebSocket.OPEN) {
          tvCable._ws.send(JSON.stringify({
            command: 'message', identifier: this._id,
            data: JSON.stringify(Object.assign({ action: action }, data || {}))
          }));
        }
      }
    };
  } catch(e) {}
}

function handleCable(msg) {
  if (msg.type === 'lobby_update') {
    (msg.players || []).forEach(function(p) { updateSlot(p.slot, p.name); });
  } else if (msg.type === 'input') {
    var slot = msg.slot, dir = msg.dir;
    if (slot >= 0 && slot <= 3) {
      phoneInput[slot].left  = dir === 'left';
      phoneInput[slot].right = dir === 'right';
    }
  }
}

function updateSlot(slot, name) {
  var cols = ['#a0a0a0','#00ffcc','#44cc66','#aa88ff'];
  var el = document.getElementById('slot' + slot);
  var nm = document.getElementById('slot' + slot + 'name');
  if (el) el.style.borderColor = name ? cols[slot] : '#333';
  if (nm) { nm.textContent = name || 'EMPTY'; nm.style.color = name ? '#fff' : '#444'; }
}

// ---- Game state ----
var gameState = 'title';
var worlds = [];
var gameStartTime = 0;
var GAME_SECS = 90;

function tvStart() {
  if (tvSub) tvSub.send('start_game', {});
  startGame();
}

function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('endScreen').style.display = 'none';
  worlds = [0, 1, 2, 3].map(createWorld);
  gameStartTime = Date.now();
  gameState = 'playing';
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    document.getElementById('pauseScreen').style.display = 'flex';
  } else if (gameState === 'paused') {
    resumeGame();
  }
}
function resumeGame() {
  gameState = 'playing';
  document.getElementById('pauseScreen').style.display = 'none';
}
function quitGame() {
  gameState = 'title';
  document.getElementById('pauseScreen').style.display = 'none';
  document.getElementById('titleScreen').style.display = 'flex';
  // Reset phone inputs
  phoneInput.forEach(function(p) { p.left = false; p.right = false; });
}

function checkGameOver() {
  if (!worlds.every(function(w) { return w.dead; })) return;
  gameState = 'gameover';

  // Broadcast results to phones
  var sorted = worlds.slice().sort(function(a, b) { return b.finalScore - a.finalScore; });
  var results = sorted.map(function(w, i) { return { slot: w.ci, score: w.finalScore, rank: i + 1 }; });
  if (tvSub) tvSub.send('game_ended', { results: results });

  var sorted = worlds.slice().sort(function(a, b) { return b.finalScore - a.finalScore; });
  winnerCi    = sorted[0].ci;
  winnerScore = sorted[0].finalScore;

  var winnerCh = CHARS[winnerCi];
  var endTitle = document.getElementById('endTitle');
  endTitle.textContent = winnerCh.name + ' WINS!';
  endTitle.style.color = winnerCh.colour;

  var grid = '';
  sorted.forEach(function(w, i) {
    var ch = CHARS[w.ci];
    grid += '<div class="score-card' + (i === 0 ? ' winner' : '') + '">';
    grid += '<div class="score-char" style="color:' + ch.colour + '">' + ch.name + '</div>';
    grid += '<div class="score-val">' + w.finalScore + ' ALT</div>';
    grid += '<div class="score-rank">' + (i === 0 ? 'WINNER!' : '#' + (i+1)) + '</div>';
    grid += '</div>';
  });
  document.getElementById('scoreGrid').innerHTML = grid;

  var qualifies = winnerScore > 0 && (lbData.length < 10 || winnerScore > lbData[lbData.length - 1].value);
  document.getElementById('nameEntry').style.display = qualifies ? 'flex' : 'none';

  renderLb('endLb');
  document.getElementById('endScreen').style.display = 'flex';
}

// ---- Game loop ----
function loop() {
  requestAnimationFrame(loop);
  if (gameState === 'playing') {
    // Clock-out: kill remaining players when time expires
    var elapsed = (Date.now() - gameStartTime) / 1000;
    if (elapsed >= GAME_SECS) {
      worlds.forEach(function(w) {
        if (!w.dead) { w.dead = true; w.finalScore = w.score; }
      });
    }
    worlds.forEach(function(w) { if (!w.dead) updateWorld(w); });
    checkGameOver();
    drawFrame();
  } else if (gameState === 'paused') {
    drawFrame();
  }
}

// Show join URL in lobby
(function() {
  var base = window.location.origin;
  var url = base + '/dino-jump/join?code=' + gameCode;
  var el = document.getElementById('joinUrl');
  if (el) el.textContent = url.replace(/^https?:\/\//, '');
})();

initCable();
fetchLb();
loop();
</script>
